name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Backend (Validation)
        run: |
          cd backend
          npm install
          npx prisma generate
          npm run build

      - name: Build Frontend (Validation)
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/herbes
            git pull origin main
            
            # Backend
            cd backend
            npm install
            npx prisma generate
            npm run build
            
            # Frontend
            cd ../frontend
            npm install
            npm run build
            
            # Restart Services
            cd ..
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save
